# User management endpoints

/users:
  get:
    tags:
      - Users
    summary: List users with pagination and filtering
    description: |
      Retrieve a paginated list of users with optional filtering.
      Requires authentication and appropriate permissions.
    operationId: getUsers
    security:
      - bearerAuth: []
      - apiKeyAuth: []
    parameters:
      - $ref: '../base.yaml#/components/parameters/PageParam'
      - $ref: '../base.yaml#/components/parameters/LimitParam'
      - $ref: '../base.yaml#/components/parameters/SortByParam'
      - $ref: '../base.yaml#/components/parameters/SortOrderParam'
      - name: search
        in: query
        description: Search term to filter users by name or email
        schema:
          type: string
          minLength: 1
          maxLength: 100
          example: "john"
      - name: isActive
        in: query
        description: Filter users by active status
        schema:
          type: boolean
          example: true
    responses:
      '200':
        description: Users retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../base.yaml#/components/schemas/PaginatedResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '../base.yaml#/components/schemas/User'
      '400':
        $ref: '../base.yaml#/components/responses/ValidationError'
      '401':
        $ref: '../base.yaml#/components/responses/UnauthorizedError'
      '403':
        $ref: '../base.yaml#/components/responses/ForbiddenError'
      '429':
        $ref: '../base.yaml#/components/responses/RateLimitError'

  post:
    tags:
      - Users
    summary: Create a new user
    description: |
      Create a new user account. This operation requires admin privileges.
      The password will be hashed before storage.
    operationId: createUser
    security:
      - bearerAuth: []
      - apiKeyAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../base.yaml#/components/schemas/CreateUserRequest'
    responses:
      '201':
        description: User created successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../base.yaml#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../base.yaml#/components/schemas/User'
      '400':
        $ref: '../base.yaml#/components/responses/ValidationError'
      '401':
        $ref: '../base.yaml#/components/responses/UnauthorizedError'
      '403':
        $ref: '../base.yaml#/components/responses/ForbiddenError'
      '409':
        $ref: '../base.yaml#/components/responses/ConflictError'
      '429':
        $ref: '../base.yaml#/components/responses/RateLimitError'

/users/me:
  get:
    tags:
      - Users
    summary: Get current user profile
    description: |
      Retrieve the profile of the currently authenticated user.
      This endpoint allows users to view their own profile information.
    operationId: getCurrentUser
    security:
      - bearerAuth: []
      - apiKeyAuth: []
    responses:
      '200':
        description: Current user profile retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../base.yaml#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../base.yaml#/components/schemas/User'
      '401':
        $ref: '../base.yaml#/components/responses/UnauthorizedError'

  put:
    tags:
      - Users
    summary: Update current user profile
    description: |
      Update the profile of the currently authenticated user.
      Users can only update their own profile information.
    operationId: updateCurrentUser
    security:
      - bearerAuth: []
      - apiKeyAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../base.yaml#/components/schemas/UpdateUserRequest'
    responses:
      '200':
        description: Profile updated successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../base.yaml#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../base.yaml#/components/schemas/User'
      '400':
        $ref: '../base.yaml#/components/responses/ValidationError'
      '401':
        $ref: '../base.yaml#/components/responses/UnauthorizedError'
      '409':
        $ref: '../base.yaml#/components/responses/ConflictError'
      '429':
        $ref: '../base.yaml#/components/responses/RateLimitError'

/users/{id}:
  get:
    tags:
      - Users
    summary: Get user by ID
    description: |
      Retrieve a specific user by their ID.
      Users can view their own profile, admins can view any user.
    operationId: getUserById
    security:
      - bearerAuth: []
      - apiKeyAuth: []
    parameters:
      - name: id
        in: path
        required: true
        description: User ID
        schema:
          type: string
          format: uuid
          example: "clp1234567890abcdef"
    responses:
      '200':
        description: User retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../base.yaml#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../base.yaml#/components/schemas/User'
      '401':
        $ref: '../base.yaml#/components/responses/UnauthorizedError'
      '403':
        $ref: '../base.yaml#/components/responses/ForbiddenError'
      '404':
        $ref: '../base.yaml#/components/responses/NotFoundError'

  put:
    tags:
      - Users
    summary: Update user by ID
    description: |
      Update a specific user by their ID.
      Users can update their own profile, admins can update any user.
    operationId: updateUserById
    security:
      - bearerAuth: []
      - apiKeyAuth: []
    parameters:
      - name: id
        in: path
        required: true
        description: User ID
        schema:
          type: string
          format: uuid
          example: "clp1234567890abcdef"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../base.yaml#/components/schemas/UpdateUserRequest'
    responses:
      '200':
        description: User updated successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../base.yaml#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../base.yaml#/components/schemas/User'
      '400':
        $ref: '../base.yaml#/components/responses/ValidationError'
      '401':
        $ref: '../base.yaml#/components/responses/UnauthorizedError'
      '403':
        $ref: '../base.yaml#/components/responses/ForbiddenError'
      '404':
        $ref: '../base.yaml#/components/responses/NotFoundError'
      '409':
        $ref: '../base.yaml#/components/responses/ConflictError'
      '429':
        $ref: '../base.yaml#/components/responses/RateLimitError'

  delete:
    tags:
      - Users
    summary: Delete user by ID
    description: |
      Delete a specific user by their ID.
      This operation requires admin privileges and cannot be undone.
    operationId: deleteUserById
    security:
      - bearerAuth: []
      - apiKeyAuth: []
    parameters:
      - name: id
        in: path
        required: true
        description: User ID
        schema:
          type: string
          format: uuid
          example: "clp1234567890abcdef"
    responses:
      '204':
        description: User deleted successfully
      '401':
        $ref: '../base.yaml#/components/responses/UnauthorizedError'
      '403':
        $ref: '../base.yaml#/components/responses/ForbiddenError'
      '404':
        $ref: '../base.yaml#/components/responses/NotFoundError'
      '429':
        $ref: '../base.yaml#/components/responses/RateLimitError'