# Health and monitoring schemas

HealthStatus:
  type: object
  description: Basic health status
  required:
    - status
    - timestamp
    - uptime
    - version
    - environment
    - node
  properties:
    status:
      type: string
      enum: [healthy, unhealthy]
      description: Overall service status
      example: "healthy"
    timestamp:
      $ref: './common.yaml#/Timestamp'
    uptime:
      type: number
      description: Service uptime in seconds
      example: 3600.5
    version:
      type: string
      description: Application version
      example: "1.0.0"
    environment:
      type: string
      enum: [development, production, test]
      description: Current environment
      example: "development"
    node:
      type: string
      description: Node.js version
      example: "v20.10.0"

DetailedHealthStatus:
  allOf:
    - $ref: '#/HealthStatus'
    - type: object
      properties:
        checks:
          type: object
          description: Health checks for dependencies
          properties:
            database:
              $ref: '#/HealthCheck'
            redis:
              $ref: '#/HealthCheck'
            services:
              type: object
              properties:
                status:
                  type: string
                  enum: [healthy, unhealthy]
                  example: "healthy"
                services:
                  type: object
                  properties:
                    userService:
                      $ref: '#/ServiceHealthCheck'
                    authService:
                      $ref: '#/ServiceHealthCheck'

HealthCheck:
  type: object
  description: Individual health check result
  required:
    - status
  properties:
    status:
      type: string
      enum: [healthy, unhealthy]
      description: Health check status
      example: "healthy"
    latency:
      type: number
      description: Response time in milliseconds
      example: 15.5
    error:
      type: string
      description: Error message if unhealthy
      example: "Connection timeout"

ServiceHealthCheck:
  type: object
  description: Service-specific health check
  required:
    - name
    - status
  properties:
    name:
      type: string
      description: Service name
      example: "UserService"
    status:
      type: string
      enum: [healthy, degraded, unhealthy]
      description: Service status
      example: "healthy"
    latency:
      type: number
      description: Response time in milliseconds
      example: 25.3
    error:
      type: string
      description: Error message if unhealthy
      example: "Database connection failed"
    details:
      type: object
      description: Additional service-specific details
      example:
        database: "connected"
        operations: "functional"

ReadinessStatus:
  type: object
  description: Kubernetes readiness probe status
  required:
    - status
    - timestamp
    - message
  properties:
    status:
      type: string
      enum: [ready, not_ready]
      description: Readiness status
      example: "ready"
    timestamp:
      $ref: './common.yaml#/Timestamp'
    message:
      type: string
      description: Status message
      example: "Service is ready to accept requests"
    error:
      type: string
      description: Error message if not ready
      example: "Database connection failed"

LivenessStatus:
  type: object
  description: Kubernetes liveness probe status
  required:
    - status
    - timestamp
    - uptime
    - memory
    - pid
  properties:
    status:
      type: string
      enum: [alive]
      description: Liveness status
      example: "alive"
    timestamp:
      $ref: './common.yaml#/Timestamp'
    uptime:
      type: number
      description: Process uptime in seconds
      example: 3600.5
    memory:
      type: object
      description: Memory usage information
      properties:
        rss:
          type: number
          description: Resident Set Size in bytes
          example: 52428800
        heapTotal:
          type: number
          description: Total heap size in bytes
          example: 20971520
        heapUsed:
          type: number
          description: Used heap size in bytes
          example: 15728640
        external:
          type: number
          description: External memory usage in bytes
          example: 1048576
    pid:
      type: integer
      description: Process ID
      example: 12345

ApplicationMetrics:
  type: object
  description: Comprehensive application metrics
  required:
    - timestamp
    - uptime
    - memory
    - cpu
    - system
    - application
    - security
  properties:
    timestamp:
      $ref: './common.yaml#/Timestamp'
    uptime:
      type: number
      description: Application uptime in seconds
      example: 3600.5
    memory:
      type: object
      description: Memory usage metrics
      properties:
        rss:
          type: number
          example: 52428800
        heapTotal:
          type: number
          example: 20971520
        heapUsed:
          type: number
          example: 15728640
        external:
          type: number
          example: 1048576
    cpu:
      type: object
      description: CPU usage metrics
      properties:
        user:
          type: number
          description: User CPU time in microseconds
          example: 1000000
        system:
          type: number
          description: System CPU time in microseconds
          example: 500000
    system:
      type: object
      description: System information
      properties:
        platform:
          type: string
          example: "linux"
        arch:
          type: string
          example: "x64"
        nodeVersion:
          type: string
          example: "v20.10.0"
        pid:
          type: integer
          example: 12345
    application:
      type: object
      description: Application-specific metrics
      properties:
        version:
          type: string
          example: "1.0.0"
        environment:
          type: string
          example: "development"
        port:
          type: integer
          example: 3000
    security:
      type: object
      description: Security configuration summary
      properties:
        helmet:
          type: object
          properties:
            enabled:
              type: boolean
              example: true
            features:
              type: array
              items:
                type: string
              example: ["contentSecurityPolicy", "hsts", "noSniff"]
        cors:
          type: object
          properties:
            enabled:
              type: boolean
              example: true
            allowedOrigins:
              type: array
              items:
                type: string
              example: ["http://localhost:3000"]
        rateLimit:
          type: object
          properties:
            enabled:
              type: boolean
              example: true
            windowMs:
              type: integer
              example: 900000
            maxRequests:
              type: integer
              example: 100

ApplicationInfo:
  type: object
  description: General application information
  required:
    - name
    - description
    - version
    - environment
    - node
    - uptime
    - timestamp
    - features
    - endpoints
  properties:
    name:
      type: string
      description: Application name
      example: "Express TypeScript Boilerplate"
    description:
      type: string
      description: Application description
      example: "Production-ready Express.js TypeScript boilerplate for blockchain microservices"
    version:
      type: string
      description: Application version
      example: "1.0.0"
    environment:
      type: string
      description: Current environment
      example: "development"
    node:
      type: string
      description: Node.js version
      example: "v20.10.0"
    uptime:
      type: number
      description: Application uptime in seconds
      example: 3600.5
    timestamp:
      $ref: './common.yaml#/Timestamp'
    features:
      type: object
      description: Available features
      properties:
        authentication:
          type: array
          items:
            type: string
          example: ["JWT", "API Keys"]
        authorization:
          type: array
          items:
            type: string
          example: ["RBAC", "Permissions"]
        security:
          type: array
          items:
            type: string
          example: ["Helmet", "CORS", "Rate Limiting", "Input Validation"]
        database:
          type: array
          items:
            type: string
          example: ["PostgreSQL", "Prisma ORM"]
        cache:
          type: array
          items:
            type: string
          example: ["Redis"]
        logging:
          type: array
          items:
            type: string
          example: ["Winston", "Structured Logging"]
        monitoring:
          type: array
          items:
            type: string
          example: ["Health Checks", "Metrics"]
        documentation:
          type: array
          items:
            type: string
          example: ["OpenAPI/Swagger"]
    endpoints:
      type: object
      description: Key endpoint URLs
      properties:
        health:
          type: string
          example: "/api/v1/health"
        metrics:
          type: string
          example: "/api/v1/metrics"
        docs:
          type: string
          example: "/api-docs"