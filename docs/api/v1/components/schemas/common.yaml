# Common schemas used across the API

ApiResponse:
  type: object
  description: Standard API response format
  required:
    - success
    - meta
  properties:
    success:
      type: boolean
      description: Indicates if the request was successful
      example: true
    data:
      description: Response data (varies by endpoint)
    error:
      $ref: '#/ErrorDetails'
    meta:
      $ref: '#/ResponseMeta'

PaginatedResponse:
  allOf:
    - $ref: '#/ApiResponse'
    - type: object
      properties:
        pagination:
          $ref: '#/PaginationMeta'

ErrorDetails:
  type: object
  description: Error information
  required:
    - code
    - message
  properties:
    code:
      type: string
      description: Error code
      example: "VALIDATION_ERROR"
    message:
      type: string
      description: Human-readable error message
      example: "Validation failed for request body"
    details:
      description: Additional error details
      example: 
        field: "email"
        value: "invalid-email"

ResponseMeta:
  type: object
  description: Response metadata
  required:
    - timestamp
    - version
  properties:
    timestamp:
      type: string
      format: date-time
      description: Response timestamp
      example: "2025-09-23T01:23:45.678Z"
    requestId:
      type: string
      description: Unique request identifier
      example: "req_clp1234567890abcdef"
    version:
      type: string
      description: API version
      example: "v1"

PaginationMeta:
  type: object
  description: Pagination information
  required:
    - page
    - limit
    - total
    - totalPages
    - hasNext
    - hasPrev
  properties:
    page:
      type: integer
      minimum: 1
      description: Current page number
      example: 1
    limit:
      type: integer
      minimum: 1
      maximum: 100
      description: Number of items per page
      example: 20
    total:
      type: integer
      minimum: 0
      description: Total number of items
      example: 150
    totalPages:
      type: integer
      minimum: 0
      description: Total number of pages
      example: 8
    hasNext:
      type: boolean
      description: Whether there is a next page
      example: true
    hasPrev:
      type: boolean
      description: Whether there is a previous page
      example: false

# Common field types
Id:
  type: string
  description: Unique identifier
  pattern: '^[a-zA-Z0-9_-]+$'
  example: "clp1234567890abcdef"

Email:
  type: string
  format: email
  description: Email address
  example: "user@example.com"

Username:
  type: string
  pattern: '^[a-zA-Z0-9_-]{3,30}$'
  description: Username (3-30 characters, alphanumeric, underscore, hyphen)
  example: "john_doe"

Password:
  type: string
  minLength: 8
  maxLength: 128
  description: Password (minimum 8 characters)
  example: "SecurePassword123!"

Timestamp:
  type: string
  format: date-time
  description: ISO 8601 timestamp
  example: "2025-09-23T01:23:45.678Z"

# Rate limiting headers
RateLimitHeaders:
  type: object
  description: Rate limiting information in response headers
  properties:
    RateLimit-Limit:
      type: string
      description: Maximum number of requests allowed in the time window
      example: "100"
    RateLimit-Remaining:
      type: string
      description: Number of requests remaining in the current window
      example: "95"
    RateLimit-Reset:
      type: string
      description: Unix timestamp when the rate limit window resets
      example: "1695427425"