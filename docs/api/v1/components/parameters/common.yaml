# Common parameter definitions

PageParam:
  name: page
  in: query
  description: Page number for pagination
  required: false
  schema:
    type: integer
    minimum: 1
    default: 1
    example: 1

LimitParam:
  name: limit
  in: query
  description: Number of items per page
  required: false
  schema:
    type: integer
    minimum: 1
    maximum: 100
    default: 20
    example: 20

SortByParam:
  name: sortBy
  in: query
  description: Field to sort by
  required: false
  schema:
    type: string
    example: "createdAt"

SortOrderParam:
  name: sortOrder
  in: query
  description: Sort order
  required: false
  schema:
    type: string
    enum: [asc, desc]
    default: desc
    example: "desc"

SearchParam:
  name: search
  in: query
  description: Search term
  required: false
  schema:
    type: string
    minLength: 1
    maxLength: 100
    example: "john"

IdParam:
  name: id
  in: path
  description: Resource ID
  required: true
  schema:
    type: string
    pattern: '^[a-zA-Z0-9_-]+$'
    example: "clp1234567890abcdef"

RequestIdHeader:
  name: X-Request-ID
  in: header
  description: Unique request identifier for tracing
  required: false
  schema:
    type: string
    example: "req_clp1234567890abcdef"

UserAgentHeader:
  name: User-Agent
  in: header
  description: Client user agent
  required: false
  schema:
    type: string
    example: "MyApp/1.0.0"