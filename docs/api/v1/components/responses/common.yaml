# Common response definitions

ValidationError:
  description: Validation error
  content:
    application/json:
      schema:
        allOf:
          - $ref: '../schemas/common.yaml#/ApiResponse'
          - type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                $ref: '../schemas/common.yaml#/ErrorDetails'
      examples:
        validationError:
          summary: Validation error example
          value:
            success: false
            error:
              code: "VALIDATION_ERROR"
              message: "Validation failed for request body"
              details:
                field: "email"
                message: "Invalid email format"
                value: "invalid-email"
            meta:
              timestamp: "2025-09-23T01:23:45.678Z"
              requestId: "req_clp1234567890abcdef"
              version: "v1"

