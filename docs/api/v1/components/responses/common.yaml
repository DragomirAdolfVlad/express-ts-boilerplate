RateLimitError:
  description: Rate limit exceeded
  headers:
    RateLimit-Limit:
      description: Maximum number of requests allowed
      schema:
        type: string
        example: "100"
    RateLimit-Remaining:
      description: Number of requests remaining
      schema:
        type: string
        example: "0"
    RateLimit-Reset:
      description: Unix timestamp when limit resets
      schema:
        type: string
        example: "1695427425"
    Retry-After:
      description: Seconds to wait before retrying
      schema:
        type: string
        example: "60"
  content:
    application/json:
      schema:
        allOf:
          - $ref: '../schemas/common.yaml#/ApiResponse'
          - type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                $ref: '../schemas/common.yaml#/ErrorDetails'
      examples:
        rateLimit:
          summary: Rate limit error example
          value:
            success: false
            error:
              code: "RATE_LIMIT_EXCEEDED"
              message: "Too many requests, please try again later"
              details:
                limit: 100
                windowMs: 900000
                retryAfter: 60
            meta:
              timestamp: "2025-09-23T01:23:45.678Z"
              requestId: "req_clp1234567890abcdef"
              version: "v1"

