# Authentication endpoints

/auth/login:
  post:
    tags:
      - Authentication
    summary: User login
    description: |
      Authenticate a user with email and password.
      Returns JWT access and refresh tokens on success.
    operationId: login
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/auth.yaml#/LoginRequest'
          examples:
            validLogin:
              $ref: '../components/examples/auth.yaml#/validLogin'
    responses:
      '200':
        description: Login successful
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/auth.yaml#/LoginResponse'
            examples:
              loginSuccess:
                $ref: '../components/examples/auth.yaml#/loginSuccess'
      '400':
        $ref: '../components/responses/common.yaml#/ValidationError'
      '401':
        $ref: '../components/responses/common.yaml#/UnauthorizedError'
      '429':
        $ref: '../components/responses/common.yaml#/RateLimitError'

/auth/refresh:
  post:
    tags:
      - Authentication
    summary: Refresh access token
    description: |
      Refresh an expired access token using a valid refresh token.
      Returns new access and refresh tokens.
    operationId: refreshToken
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/auth.yaml#/RefreshTokenRequest'
          examples:
            validRefresh:
              $ref: '../components/examples/auth.yaml#/validRefresh'
    responses:
      '200':
        description: Token refreshed successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/auth.yaml#/RefreshTokenResponse'
      '400':
        $ref: '../components/responses/common.yaml#/ValidationError'
      '401':
        $ref: '../components/responses/common.yaml#/UnauthorizedError'
      '429':
        $ref: '../components/responses/common.yaml#/RateLimitError'

/auth/logout:
  post:
    tags:
      - Authentication
    summary: User logout
    description: |
      Logout the current user and invalidate their session.
      Requires authentication.
    operationId: logout
    security:
      - bearerAuth: []
      - apiKeyAuth: []
    responses:
      '200':
        description: Logout successful
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/ApiResponse'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        message:
                          type: string
                          example: "Logged out successfully"
      '401':
        $ref: '../components/responses/common.yaml#/UnauthorizedError'

/auth/me:
  get:
    tags:
      - Authentication
    summary: Get current authentication info
    description: |
      Get information about the current authentication context.
      Shows user info for JWT tokens or API key info for API key authentication.
    operationId: getCurrentAuth
    security:
      - bearerAuth: []
      - apiKeyAuth: []
    responses:
      '200':
        description: Current authentication info
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/auth.yaml#/AuthContextResponse'
            examples:
              jwtAuth:
                $ref: '../components/examples/auth.yaml#/jwtAuthContext'
              apiKeyAuth:
                $ref: '../components/examples/auth.yaml#/apiKeyAuthContext'
      '401':
        $ref: '../components/responses/common.yaml#/UnauthorizedError'

/auth/verify:
  post:
    tags:
      - Authentication
    summary: Verify token (debugging)
    description: |
      Verify and decode a JWT token for debugging purposes.
      This endpoint is useful for development and troubleshooting.
    operationId: verifyToken
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/auth.yaml#/VerifyTokenRequest'
          examples:
            verifyAccess:
              $ref: '../components/examples/auth.yaml#/verifyAccess'
            verifyRefresh:
              $ref: '../components/examples/auth.yaml#/verifyRefresh'
    responses:
      '200':
        description: Token verification result
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/auth.yaml#/VerifyTokenResponse'
            examples:
              validToken:
                $ref: '../components/examples/auth.yaml#/validTokenVerification'
              invalidToken:
                $ref: '../components/examples/auth.yaml#/invalidTokenVerification'
      '400':
        $ref: '../components/responses/common.yaml#/ValidationError'
      '429':
        $ref: '../components/responses/common.yaml#/RateLimitError'

/auth/api-keys:
  post:
    tags:
      - Authentication
    summary: Create API key
    description: |
      Create a new API key for the authenticated user.
      API keys can have custom permissions and rate limits.
    operationId: createApiKey
    security:
      - bearerAuth: []
      - apiKeyAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/auth.yaml#/CreateApiKeyRequest'
          examples:
            basicApiKey:
              $ref: '../components/examples/auth.yaml#/basicApiKey'
            advancedApiKey:
              $ref: '../components/examples/auth.yaml#/advancedApiKey'
    responses:
      '201':
        description: API key created successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/auth.yaml#/ApiKeyResponse'
            examples:
              apiKeyCreated:
                $ref: '../components/examples/auth.yaml#/apiKeyCreated'
      '400':
        $ref: '../components/responses/common.yaml#/ValidationError'
      '401':
        $ref: '../components/responses/common.yaml#/UnauthorizedError'
      '429':
        $ref: '../components/responses/common.yaml#/RateLimitError'

/auth/api-keys/{keyId}:
  delete:
    tags:
      - Authentication
    summary: Revoke API key
    description: |
      Revoke an existing API key by its key ID.
      Once revoked, the API key cannot be used for authentication.
    operationId: revokeApiKey
    security:
      - bearerAuth: []
      - apiKeyAuth: []
    parameters:
      - name: keyId
        in: path
        required: true
        description: The API key ID to revoke
        schema:
          type: string
          pattern: '^ak_[0-9]+_[a-zA-Z0-9]+$'
          example: "ak_1234567890_admin"
    responses:
      '200':
        description: API key revoked successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/ApiResponse'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        message:
                          type: string
                          example: "API key revoked successfully"
      '401':
        $ref: '../components/responses/common.yaml#/UnauthorizedError'
      '404':
        $ref: '../components/responses/common.yaml#/NotFoundError'
      '429':
        $ref: '../components/responses/common.yaml#/RateLimitError'