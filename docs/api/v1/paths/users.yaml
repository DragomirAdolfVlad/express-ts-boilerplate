# User management endpoints

/users:
  get:
    tags:
      - Users
    summary: List users with pagination and filtering
    description: |
      Retrieve a paginated list of users with optional filtering.
      Requires authentication and appropriate permissions.
    operationId: getUsers
    security:
      - bearerAuth: []
      - apiKeyAuth: []
    parameters:
      - $ref: '../components/parameters/common.yaml#/PageParam'
      - $ref: '../components/parameters/common.yaml#/LimitParam'
      - $ref: '../components/parameters/common.yaml#/SortByParam'
      - $ref: '../components/parameters/common.yaml#/SortOrderParam'
      - name: search
        in: query
        description: Search term to filter users by name or email
        schema:
          type: string
          minLength: 1
          maxLength: 100
          example: "john"
      - name: isActive
        in: query
        description: Filter users by active status
        schema:
          type: boolean
          example: true
      - name: email
        in: query
        description: Filter users by email (partial match)
        schema:
          type: string
          format: email
          example: "john@example.com"
      - name: username
        in: query
        description: Filter users by username (partial match)
        schema:
          type: string
          example: "john"
    responses:
      '200':
        description: Users retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/PaginatedResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '../components/schemas/users.yaml#/User'
            examples:
              usersList:
                $ref: '../components/examples/users.yaml#/usersList'
      '400':
        $ref: '../components/responses/common.yaml#/ValidationError'
      '401':
        $ref: '../components/responses/common.yaml#/UnauthorizedError'
      '403':
        $ref: '../components/responses/common.yaml#/ForbiddenError'
      '429':
        $ref: '../components/responses/common.yaml#/RateLimitError'

  post:
    tags:
      - Users
    summary: Create a new user
    description: |
      Create a new user account. This operation requires admin privileges.
      The password will be hashed before storage.
    operationId: createUser
    security:
      - bearerAuth: []
      - apiKeyAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/users.yaml#/CreateUserRequest'
          examples:
            basicUser:
              $ref: '../components/examples/users.yaml#/basicUser'
            fullUser:
              $ref: '../components/examples/users.yaml#/fullUser'
    responses:
      '201':
        description: User created successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/users.yaml#/User'
            examples:
              userCreated:
                $ref: '../components/examples/users.yaml#/userCreated'
      '400':
        $ref: '../components/responses/common.yaml#/ValidationError'
      '401':
        $ref: '../components/responses/common.yaml#/UnauthorizedError'
      '403':
        $ref: '../components/responses/common.yaml#/ForbiddenError'
      '409':
        $ref: '../components/responses/common.yaml#/ConflictError'
      '429':
        $ref: '../components/responses/common.yaml#/RateLimitError'

/users/me:
  get:
    tags:
      - Users
    summary: Get current user profile
    description: |
      Retrieve the profile of the currently authenticated user.
      This endpoint allows users to view their own profile information.
    operationId: getCurrentUser
    security:
      - bearerAuth: []
      - apiKeyAuth: []
    responses:
      '200':
        description: Current user profile retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/users.yaml#/User'
            examples:
              currentUser:
                $ref: '../components/examples/users.yaml#/currentUser'
      '401':
        $ref: '../components/responses/common.yaml#/UnauthorizedError'

  put:
    tags:
      - Users
    summary: Update current user profile
    description: |
      Update the profile of the currently authenticated user.
      Users can only update their own profile information.
    operationId: updateCurrentUser
    security:
      - bearerAuth: []
      - apiKeyAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/users.yaml#/UpdateUserRequest'
          examples:
            updateProfile:
              $ref: '../components/examples/users.yaml#/updateProfile'
    responses:
      '200':
        description: Profile updated successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/users.yaml#/User'
            examples:
              profileUpdated:
                $ref: '../components/examples/users.yaml#/profileUpdated'
      '400':
        $ref: '../components/responses/common.yaml#/ValidationError'
      '401':
        $ref: '../components/responses/common.yaml#/UnauthorizedError'
      '409':
        $ref: '../components/responses/common.yaml#/ConflictError'
      '429':
        $ref: '../components/responses/common.yaml#/RateLimitError'

/users/{id}:
  get:
    tags:
      - Users
    summary: Get user by ID
    description: |
      Retrieve a specific user by their ID.
      Users can view their own profile, admins can view any user.
    operationId: getUserById
    security:
      - bearerAuth: []
      - apiKeyAuth: []
    parameters:
      - name: id
        in: path
        required: true
        description: User ID
        schema:
          type: string
          format: uuid
          example: "clp1234567890abcdef"
    responses:
      '200':
        description: User retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/users.yaml#/User'
            examples:
              userById:
                $ref: '../components/examples/users.yaml#/userById'
      '401':
        $ref: '../components/responses/common.yaml#/UnauthorizedError'
      '403':
        $ref: '../components/responses/common.yaml#/ForbiddenError'
      '404':
        $ref: '../components/responses/common.yaml#/NotFoundError'

  put:
    tags:
      - Users
    summary: Update user by ID
    description: |
      Update a specific user by their ID.
      Users can update their own profile, admins can update any user.
    operationId: updateUserById
    security:
      - bearerAuth: []
      - apiKeyAuth: []
    parameters:
      - name: id
        in: path
        required: true
        description: User ID
        schema:
          type: string
          format: uuid
          example: "clp1234567890abcdef"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/users.yaml#/UpdateUserRequest'
          examples:
            updateUser:
              $ref: '../components/examples/users.yaml#/updateUser'
    responses:
      '200':
        description: User updated successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/users.yaml#/User'
            examples:
              userUpdated:
                $ref: '../components/examples/users.yaml#/userUpdated'
      '400':
        $ref: '../components/responses/common.yaml#/ValidationError'
      '401':
        $ref: '../components/responses/common.yaml#/UnauthorizedError'
      '403':
        $ref: '../components/responses/common.yaml#/ForbiddenError'
      '404':
        $ref: '../components/responses/common.yaml#/NotFoundError'
      '409':
        $ref: '../components/responses/common.yaml#/ConflictError'
      '429':
        $ref: '../components/responses/common.yaml#/RateLimitError'

  delete:
    tags:
      - Users
    summary: Delete user by ID
    description: |
      Delete a specific user by their ID.
      This operation requires admin privileges and cannot be undone.
    operationId: deleteUserById
    security:
      - bearerAuth: []
      - apiKeyAuth: []
    parameters:
      - name: id
        in: path
        required: true
        description: User ID
        schema:
          type: string
          format: uuid
          example: "clp1234567890abcdef"
    responses:
      '204':
        description: User deleted successfully
      '401':
        $ref: '../components/responses/common.yaml#/UnauthorizedError'
      '403':
        $ref: '../components/responses/common.yaml#/ForbiddenError'
      '404':
        $ref: '../components/responses/common.yaml#/NotFoundError'
      '429':
        $ref: '../components/responses/common.yaml#/RateLimitError'